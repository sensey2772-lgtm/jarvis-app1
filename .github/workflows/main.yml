name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ЭТОТ БЛОК УБИРАЕТ ВАШЕ ПРЕДУПРЕЖДЕНИЕ
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          pip install flet
          # Добавил флаг --verbose, чтобы увидеть РЕАЛЬНУЮ ошибку в логах
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: build/apk/*.apk
