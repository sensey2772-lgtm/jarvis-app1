name: Build Android APK
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Нужно для корректной сборки графических элементов Flet
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libmpv-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          pip install flet
          # Флаг --include-all-platforms делает APK совместимым со всеми телефонами
          flet build apk --include-all-platforms --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          # Flet иногда меняет путь, этот паттерн найдет APK в любом случае
          path: build/apk/*.apk
