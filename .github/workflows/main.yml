name: Build Android APK
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Установка системных библиотек для сборщика
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libmpv-dev portaudio19-dev libasound2-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          pip install flet
          # ВАЖНО: Перечисляем все ваши библиотеки через запятую без пробелов
          flet build apk --include-all-platforms --verbose --requirements flet,bcrypt,SpeechRecognition,PyAudio,gTTS,pygame,huggingface_hub,plyer
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: build/apk/*.apk
